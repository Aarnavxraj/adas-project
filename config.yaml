video:
  default_path: "data/videos/traffic.mp4"
  save_output: true
  output_path: "outputs/processed.mp4"

lane_detection:
  roi:
    left_bottom_x: 0.30
    left_top_x: 0.44
    right_top_x: 0.56
    right_bottom_x: 0.70
    top_y: 0.30
    bottom_y: 0.52
  color:
    white_hls_lower: [0, 180, 0]
    white_hls_upper: [255, 255, 255]
    yellow_hls_lower: [10, 80, 100]
    yellow_hls_upper: [40, 255, 255]
  canny:
    low_threshold: 50
    high_threshold: 150
  blur_kernel: 5
  hough:
    rho: 2
    threshold: 30
    min_line_length: 60
    max_line_gap: 100
  slope_filter:
    min: 0.3
    max: 4.0
  smoothing_alpha: 0.5
  departure_offset_threshold: 50
  night_mode:
    enabled: auto
    brightness_threshold: 60
    clip_limit: 3.0
    tile_grid_size: 8

vehicle_detection:
  model_path: "yolov8n.pt"
  conf_threshold: 0.4
  vehicle_classes: ["car", "truck", "bus", "motorcycle"]
  ahead_area_ratio: 0.03
  ahead_center_proximity: 0.2
  fcw_critical_ratio: 0.08
  tracker:
    max_centroid_distance: 100
    max_lost_frames: 10
    pixels_per_meter: 20
    speed_smoothing: 5

pedestrian_risk:
  model_path: "yolov8n.pt"
  conf_threshold: 0.50
  danger_area_ratio: 0.04
  caution_area_ratio: 0.015

hud:
  background_alpha: 0.5
  width: 280
  height: 330

sign_recognition:
  enabled: true
  conf_threshold: 0.4
  yolo_model_path: "yolov8n.pt"
  custom_model_path: "models/traffic_sign_model.h5"
  sign_display_frames: 60

training:
  img_size: [32, 32]
  batch_size: 32
  epochs: 15
  train_dir: "data/traffic_signs/train"
  test_dir: "data/traffic_signs/test"
  model_path: "models/traffic_sign_model.h5"
